# docker-compose.test.yml - Integration test configuration for todofy services
# This file is used by GitHub Actions to test that all containers can successfully
# set up, communicate with each other, and serve services.
# Shared test env for CI: env/todofy.test.env

networks:
  todofy-test:
    driver: bridge

services:
  # Main todofy application (HTTP API + gRPC client)
  todofy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todofy-test
    ports:
      - "10003:8080"
    env_file:
      - ./env/todofy.test.env
    environment:
      PORT: "8080"
    depends_on:
      todofy-llm:
        condition: service_healthy
      todofy-todo:
        condition: service_healthy
      todofy-database:
        condition: service_healthy
    networks:
      - todofy-test
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # LLM service (gRPC server for AI summarization)
  todofy-llm:
    build:
      context: .
      dockerfile: llm/Dockerfile
    container_name: todofy-llm-test
    env_file:
      - ./env/todofy.test.env
    environment:
      PORT: "50051"
    networks:
      - todofy-test
    healthcheck:
      test: ["CMD", "/grpc_health_probe", "-addr=:50051"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # Todo service (gRPC server for task population via Todoist)
  todofy-todo:
    build:
      context: .
      dockerfile: todo/Dockerfile
    container_name: todofy-todo-test
    env_file:
      - ./env/todofy.test.env
    environment:
      PORT: "50052"
    networks:
      - todofy-test
    healthcheck:
      test: ["CMD", "/grpc_health_probe", "-addr=:50052"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # Database service (gRPC server for SQLite database operations)
  todofy-database:
    build:
      context: .
      dockerfile: database/Dockerfile
    container_name: todofy-database-test
    env_file:
      - ./env/todofy.test.env
    environment:
      PORT: "50053"
    volumes:
      - todofy-db-test:/root
    networks:
      - todofy-test
    healthcheck:
      test: ["CMD", "/grpc_health_probe", "-addr=:50053"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  todofy-db-test:
